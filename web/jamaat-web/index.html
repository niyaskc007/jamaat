<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Jamaat</title>

    <!-- Branding + theme. PWA install banner uses theme-color for the title bar; the
         apple-mobile-web-app-* meta tags make iOS Safari Add-to-Home-Screen feel native. -->
    <meta name="description" content="Jamaat self-service portal" />
    <meta name="theme-color" content="#0B6E63" />

    <!-- Icons. Browsers pick the closest match. PNG sizes generated from
         public/jamaat-icon.svg via `npm run icons`. -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="icon" type="image/svg+xml" href="/jamaat-icon.svg" />

    <!-- Apple PWA meta (Safari ignores the W3C manifest and reads these instead) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Jamaat" />

    <!-- Microsoft tile colour -->
    <meta name="msapplication-TileColor" content="#0B6E63" />

    <!-- Manifest is generated by vite-plugin-pwa at build time. -->
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
