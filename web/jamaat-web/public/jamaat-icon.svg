<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Square Jamaat brand icon. Green gradient background with a stylised letterform.
       Designed maskable: the safe zone is the inner 80% (cf. https://web.dev/maskable-icon/).
       Used for PWA manifest icon (any + maskable purpose) and apple-touch-icon. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E7167"/>
      <stop offset="100%" stop-color="#06403A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Decorative star pattern at low opacity for brand feel -->
  <g fill="#C9A34B" opacity="0.10">
    <circle cx="80" cy="80" r="6"/>
    <circle cx="432" cy="80" r="6"/>
    <circle cx="80" cy="432" r="6"/>
    <circle cx="432" cy="432" r="6"/>
    <circle cx="256" cy="64" r="4"/>
    <circle cx="256" cy="448" r="4"/>
    <circle cx="64" cy="256" r="4"/>
    <circle cx="448" cy="256" r="4"/>
  </g>
  <!-- "J" letterform centred. Stroke + crescent foot mimics the brand. -->
  <g transform="translate(256, 256)" fill="#FFFFFF">
    <path d="M -40 -110 L 60 -110 L 60 60 C 60 110 30 140 -10 140 C -50 140 -80 115 -90 80 L -50 70 C -45 90 -30 100 -10 100 C 10 100 25 88 25 65 L 25 -75 L -40 -75 Z"/>
  </g>
  <!-- Gold accent crescent at bottom for Jamaat brand identity -->
  <path d="M 256 460 Q 296 450 332 432 Q 296 444 256 446 Q 216 444 180 432 Q 216 450 256 460 Z"
        fill="#C9A34B" opacity="0.85"/>
</svg>
